<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Clarisse - Turing IA</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; }
        .contenedor { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .tarjeta { background: white; padding: 15px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); width: 200px; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Catálogo de Ropa para Bebés</h1>
    <div id="productos-lista" class="contenedor">
        </div>

    <script>
        // Llamar a la API
        fetch('../backend/api/get_productos.php')
            .then(response => response.json())
            .then(data => {
                const lista = document.getElementById('productos-lista');
                data.forEach(producto => {
                    lista.innerHTML += `
                        <div class="tarjeta">
                            <h3>${producto.nombre}</h3>
                            <p>${producto.descripcion}</p>
                            <p><strong>$${producto.precio}</strong></p>
                            <small>Etapa: ${producto.rango_edad}</small>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Error:', error));
    </script>
</body>
</html>
